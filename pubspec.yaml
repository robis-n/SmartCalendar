name: smart_calendar
description: "SmartCalendar — AI-powered smart calendar & accountability app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Local storage / offline
  hive_flutter: ^1.1.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: '>=0.9.0 <1.0.0'

  # Camera / photo
  image_picker: ^1.1.2
  image: ^4.3.0

  # Local on-device ML (photo verification — no API key needed)
  google_mlkit_image_labeling: ^0.11.0

  # HTTP
  dio: ^5.8.0+1
  device_calendar: ^3.9.0
  flutter_timezone: ^5.1.0
  animations: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  riverpod_generator: ^2.6.1
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
